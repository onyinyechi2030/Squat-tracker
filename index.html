<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Strength Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <p class="eyebrow">Daily Strength</p>
      <h1>Strength Log</h1>
    </header>

    <main>
      <section id="homeView" class="view active">
        <section class="hero-card">
          <p id="todayDate" class="muted"></p>
          <div class="squat-total"><span id="todayTotal">0</span></div>
          <p class="hero-label">squats today</p>

          <div class="progress-wrap">
            <div class="progress-meta">
              <span>Daily goal</span>
              <span id="dailyGoalLabel">0/50</span>
            </div>
            <div class="progress">
              <div id="dailyProgress" class="progress-bar"></div>
            </div>
          </div>
        </section>

        <section class="card">
          <h2>Add squats</h2>
          <div class="quick-grid" id="quickButtons"></div>
          <button id="customBtn" class="primary full">Add custom set</button>
          <button id="repeatBtn" class="secondary full">Repeat last set</button>
          <button id="undoBtn" class="secondary full">Undo last entry</button>
        </section>

        <section class="card">
          <h2>Other strength today?</h2>

          <div class="toggle-row">
            <button id="otherYesBtn" class="toggle-btn">Yes</button>
            <button id="otherNoBtn" class="toggle-btn">No</button>
          </div>

          <div id="otherExerciseDetails" class="hidden">
            <div id="exerciseChips" class="chip-grid"></div>

            <textarea id="exerciseNotes" rows="3" placeholder="Notes, sets, reps, etc."></textarea>

            <button id="saveExercisesBtn" class="secondary full">Save strength notes</button>
          </div>

          <p id="otherExerciseSummary" class="muted small"></p>
        </section>
      </section>

      <section id="progressView" class="view">
        <section class="stats-grid">
          <div class="stat card"><span id="streak">0</span><small>day streak</small></div>
          <div class="stat card"><span id="weekTotal">0</span><small>this week</small></div>
          <div class="stat card"><span id="monthTotal">0</span><small>last 30 days</small></div>
          <div class="stat card"><span id="bestDay">0</span><small>best day</small></div>
        </section>

        <section class="card">
          <h2>Last 14 days</h2>
          <div id="dailyChart" class="chart"></div>
        </section>
      </section>

      <section id="historyView" class="view">
        <section class="card">
          <h2>History</h2>
          <div id="historyList"></div>
        </section>
      </section>

      <section id="goalsView" class="view">
        <section class="card">
          <h2>Goals</h2>

          <label>
            Daily goal
            <input id="dailyGoalInput" type="number" min="1" />
          </label>

          <label>
            Weekly goal
            <input id="weeklyGoalInput" type="number" min="1" />
          </label>

          <label>
            Monthly goal
            <input id="monthlyGoalInput" type="number" min="1" />
          </label>

          <button id="saveGoalsBtn" class="primary full">Save goals</button>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="homeView">Home</button>
      <button class="nav-btn" data-view="progressView">Progress</button>
      <button class="nav-btn" data-view="historyView">History</button>
      <button class="nav-btn" data-view="goalsView">Goals</button>
    </nav>
  </div>

  <dialog id="customDialog">
    <h2>Add custom set</h2>
    <select id="customSelect"></select>
    <div class="dialog-actions">
      <button id="cancelCustomBtn" class="secondary">Cancel</button>
      <button id="addCustomBtn" class="primary">Add</button>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
